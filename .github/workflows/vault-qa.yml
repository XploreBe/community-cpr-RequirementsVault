name: Vault Q&A

# Three ways this fires:
# 1. Someone adds the 'vault-question' label itself (a fresh question).
# 2. Someone edits the body of an already-labeled 'vault-question' issue.
# 3. Someone posts a follow-up comment on an already-labeled 'vault-question' issue.
# The bot's own comments are explicitly excluded from re-triggering itself (see the 'if' below) —
# without that guard, the bot answering would itself count as a new comment and loop forever.
#
# Deliberately NOT "any labeled event on an issue that has vault-question", even though that
# reads similarly -- that broader condition used to also fire every time ANY other label was
# added to an already-tagged issue: a human adding 'approved' (to trigger apply-change), or even
# this same script's own set_status_label() adding/removing a status:* label, would each also
# re-trigger a full, unrelated Q&A re-run on the same issue. The 'labeled' branch below is scoped
# to github.event.label.name == 'vault-question' specifically so only the label that actually
# means "answer this" can start this job; the 'edited' branch is separate since edit events carry
# no github.event.label at all.
on:
  issues:
    types: [labeled, edited]
  issue_comment:
    types: [created]

permissions:
  issues: write      # to post the answer comment and manage the status:* triage label
  contents: read      # to read the vault files, nothing more

jobs:
  answer:
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'vault-question') ||
      (github.event_name == 'issues' && github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'vault-question')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'vault-question') && github.event.comment.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scoped per issue: two comments landing on the *same* issue in quick succession queue
    # instead of running concurrently (which could post answers out of order or fight over the
    # status:* label). Different issues get different groups, so they still run in parallel.
    # cancel-in-progress is false on purpose -- a run already in flight finishes and posts its
    # answer rather than being killed mid-way.
    concurrency:
      group: vault-qa-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Answer the question
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/vault_qa_handler.py
